apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flight-tracker-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: ws-server
                port:
                  number: 8086
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8084
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana-proxy
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: map-ui
                port:
                  number: 80
